name: Deploy JupyterLite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: jupyterlite-${{ hashFiles('requirements.txt') }}
          restore-keys: jupyterlite-

      - name: Install JupyterLite + kernel
        run: |
          pip install \
            jupyterlite-core \
            jupyterlite-pyodide-kernel \
            jupyter-server

      - name: Build site
        run: |
          jupyter lite build \
            --contents boundless_profitability.ipynb \
            --contents epochs.csv \
            --output-dir _site

      - name: Copy headers for Cloudflare Pages
        run: cp _headers _site/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: zerokrab-boundless-jupyter
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
