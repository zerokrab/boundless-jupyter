name: Deploy JupyterLite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Group by branch; cancel in-progress runs for the same branch/PR
concurrency:
  group: pages-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: jupyterlite-${{ hashFiles('requirements.txt') }}
          restore-keys: jupyterlite-

      - name: Install JupyterLite + kernel
        run: |
          pip install \
            jupyterlite-core \
            jupyterlite-pyodide-kernel \
            jupyter-server \
            panel \
            pandas numpy matplotlib nbconvert ipykernel

      - name: Execute notebook to generate results.csv
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=120 \
            boundless_profitability.ipynb \
            --output boundless_profitability.ipynb

      - name: Build JupyterLite site
        run: |
          jupyter lite build \
            --contents boundless_profitability.ipynb \
            --contents epochs.csv \
            --contents dashboard.py \
            --output-dir _site

      - name: Build Panel standalone dashboard
        run: |
          panel convert dashboard.py \
            --to pyodide-worker \
            --out _site/dashboard/
          cp results.csv _site/dashboard/results.csv

      - name: Copy headers and redirects for Cloudflare Pages
        run: |
          cp _headers _site/_headers
          cp _redirects _site/_redirects

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=zerokrab-boundless-jupyter --commit-dirty=true --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^ ]*\.pages\.dev' | tail -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "Could not extract preview URL from deploy output"
            exit 0
          fi
          # Update or create comment (avoids spam on repeated pushes)
          COMMENT_TAG="<!-- cf-pages-preview -->"
          BODY="${COMMENT_TAG}
          🚀 **Preview deployment ready!**

          **URL:** ${PREVIEW_URL}
          **Branch:** \`${{ github.head_ref }}\`
          **Commit:** \`${{ github.event.pull_request.head.sha }}\`"

          # Check for existing comment
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.body | contains("<!-- cf-pages-preview -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api graphql -f query="mutation { updateIssueComment(input: {id: \"${EXISTING}\", body: $(echo "$BODY" | jq -Rs .)}) { issueComment { id } } }"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          fi
